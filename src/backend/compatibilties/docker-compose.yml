version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: compat_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: compat_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/code
    depends_on:
      - redis

  worker:
    build: .
    container_name: compat_worker
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - ./:/code
    depends_on:
      - redis