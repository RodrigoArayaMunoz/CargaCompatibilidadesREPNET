services:
  redis:
    image: redis:7
    container_name: compat_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compat_api
    working_dir: /code
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compat_worker
    working_dir: /code
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A celery_app:celery_app worker --loglevel=info